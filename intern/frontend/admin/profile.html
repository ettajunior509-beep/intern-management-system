<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile – InternMS Admin</title>
<link rel="stylesheet" href="../css/style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div><div class="logo-text">InternMS</div><div class="logo-sub">Admin Portal</div></div></div>
   <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item active" data-page="dashboard.html"><span class="nav-icon"><i class="fa-solid fa-square-poll-horizontal"></i></span>Dashboard</a>
      <a href="interns.html"   class="nav-item" data-page="interns.html"><span class="nav-icon"><i class="fa-solid fa-users"></i></span>Interns</a>
      <a href="tasks.html"     class="nav-item" data-page="tasks.html"><span class="nav-icon"><i class="fa-solid fa-check"></i></span>Tasks</a>
      <a href="attendance.html"class="nav-item" data-page="attendance.html"><span class="nav-icon"><i class="fa-solid fa-address-book"></i></span>Attendance</a>
      <div class="nav-section-label">Tools</div>
      <a href="calendar.html"  class="nav-item" data-page="calendar.html"><span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span>Calendar</a>
      <a href="reports.html"   class="nav-item" data-page="reports.html"><span class="nav-icon"><i class="fa-regular fa-address-book"></i></span>Reports</a>
      <a href="evaluations.html" class="nav-item" data-page="evaluations.html"><span class="nav-icon"><i class="fa-brands fa-galactic-senate"></i></span>Evaluations</a>
      <div class="nav-section-label">Account</div>
      <a href="profile.html"   class="nav-item" data-page="profile.html"><span class="nav-icon"><i class="fa-solid fa-circle-user"></i></span>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-user-avatar">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Admin</div><div class="sidebar-user-role">Administrator</div></div>
        <button data-logout style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;"><i class="fa-solid fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;" onclick="document.querySelector('.sidebar').classList.remove('open');this.style.display='none';"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').style.display='block';">☰</button>
        <div><div class="topbar-title">My Profile</div><div class="topbar-subtitle">Manage your account settings</div></div>
      </div>
    </div>
    <div class="page-content">
      <div class="grid-2" style="align-items:start;">

        <!-- Left: Avatar + Info -->
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card" style="text-align:center;">
            <div style="position:relative;display:inline-block;margin-bottom:16px;">
              <div id="avatar-display" class="avatar avatar-xl" style="margin:0 auto;">A</div>
              <label for="avatar-input" style="position:absolute;bottom:0;right:0;width:30px;height:30px;background:var(--accent);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:14px;">✏️</label>
              <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">
            </div>
            <h2 id="profile-name" style="font-size:20px;font-weight:700;">Loading...</h2>
            <p id="profile-position" style="color:var(--text-muted);font-size:13px;margin-top:4px;"></p>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
              <p id="profile-email" style="font-size:13px;color:var(--text-secondary);"></p>
              <p id="profile-phone" style="font-size:13px;color:var(--text-secondary);margin-top:4px;"></p>
              <p id="profile-since" style="font-size:12px;color:var(--text-muted);margin-top:8px;">Member since —</p>
            </div>
          </div>

          <!-- Change Password -->
          <div class="card">
            <div class="card-header"><div class="card-title">Change Password</div></div>
            <form id="pw-form">
              <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-control" id="p-current" placeholder="Current password" required></div>
              <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-control" id="p-new" placeholder="New password (min 8 chars)" required></div>
              <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="p-confirm" placeholder="Repeat new password" required></div>
              <button type="submit" class="btn btn-primary w-full" id="pw-btn">Change Password</button>
            </form>
          </div>
        </div>

        <!-- Right: Edit Profile -->
        <div class="card">
          <div class="card-header"><div class="card-title">Edit Profile Information</div></div>
          <form id="profile-form">
            <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="f-name" placeholder="Full name" required></div>
            <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="f-email" placeholder="Email" disabled style="opacity:0.6;cursor:not-allowed;"></div>
            <div class="form-group"><label class="form-label">Phone Number</label><input class="form-control" id="f-phone" placeholder="Phone number"></div>
            <div class="form-group"><label class="form-label">Position / Role</label><input class="form-control" id="f-position" placeholder="e.g. HR Manager"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
              <button type="button" class="btn btn-ghost" onclick="loadProfile()">Discard</button>
              <button type="submit" class="btn btn-primary" id="profile-btn">Save Changes</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
Auth.requireAdmin(); populateSidebarUser(); initLogout();

async function loadProfile() {
  try {
    const p = await apiFetch('/admin/profile');
    document.getElementById('profile-name').textContent     = p.full_name;
    document.getElementById('profile-position').textContent = p.position||'Administrator';
    document.getElementById('profile-email').textContent    = ' '+p.email;
    document.getElementById('profile-phone').textContent    = ' '+(p.phone||'Not set');
    document.getElementById('profile-since').textContent    = 'Member since '+fmtDate(p.created_at);
    document.getElementById('f-name').value     = p.full_name||'';
    document.getElementById('f-email').value    = p.email||'';
    document.getElementById('f-phone').value    = p.phone||'';
    document.getElementById('f-position').value = p.position||'';
    const av = document.getElementById('avatar-display');
    if(p.profile_picture) { av.innerHTML=`<img src="${p.profile_picture}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">`;av.style.background='none'; }
    else { av.textContent=initials(p.full_name); }
  } catch(e){toast(e.message,'error');}
}

document.getElementById('profile-form').addEventListener('submit',async e=>{
  e.preventDefault(); const btn=document.getElementById('profile-btn'); btn.disabled=true; btn.textContent='Saving...';
  try {
    await apiFetch('/admin/profile',{method:'PUT',body:JSON.stringify({full_name:document.getElementById('f-name').value,phone:document.getElementById('f-phone').value,position:document.getElementById('f-position').value})});
    toast('Profile updated!','success'); loadProfile(); populateSidebarUser();
  } catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.textContent='Save Changes';}
});

document.getElementById('pw-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const np=document.getElementById('p-new').value, cp=document.getElementById('p-confirm').value;
  if(np!==cp) return toast('New passwords do not match','error');
  if(np.length<8) return toast('Password must be at least 8 characters','error');
  const btn=document.getElementById('pw-btn'); btn.disabled=true; btn.textContent='Changing...';
  try {
    await apiFetch('/admin/password',{method:'PATCH',body:JSON.stringify({current_password:document.getElementById('p-current').value,new_password:np})});
    toast('Password changed successfully!','success'); document.getElementById('pw-form').reset();
  } catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.textContent='Change Password';}
});

async function uploadAvatar(input) {
  if(!input.files[0]) return;
  const fd=new FormData(); fd.append('avatar',input.files[0]);
  try {
    const res=await fetch('http://localhost:5000/api/admin/avatar',{method:'POST',headers:{Authorization:`Bearer ${Auth.token()}`},body:fd});
    const data=await res.json();
    if(!res.ok) throw new Error(data.message);
    toast('Profile picture updated!','success'); loadProfile();
  } catch(e){toast(e.message,'error');}
}
loadProfile();
</script>
</body>
</html>
