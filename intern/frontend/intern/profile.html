<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Profile – InternMS</title>
<link rel="stylesheet" href="../css/style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div><div class="logo-text">InternMS</div><div class="logo-sub">Intern Portal</div></div></div>
     <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html"  class="nav-item active"><span class="nav-icon"><i class="fa-solid fa-square-poll-horizontal"></i></span>Dashboard</a>
      <a href="tasks.html"      class="nav-item"><span class="nav-icon"><i class="fa-solid fa-check"></i></span>My Tasks</a>
      <a href="attendance.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-address-book"></i></span>Attendance</a>
      <a href="calendar.html"   class="nav-item"><span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span>Calendar</a>
      <div class="nav-section-label">Account</div>
      <a href="profile.html"    class="nav-item"><span class="nav-icon"><i class="fa-solid fa-circle-user"></i></span>My Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-user-avatar">I</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Intern</div><div class="sidebar-user-role">Intern</div></div>
        <button data-logout style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;"><i class="fa-solid fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;" onclick="document.querySelector('.sidebar').classList.remove('open');this.style.display='none';"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').style.display='block';">☰</button>
        <div><div class="topbar-title">My Profile</div><div class="topbar-subtitle">View and update your information</div></div>
      </div>
    </div>
    <div class="page-content">
      <div class="grid-2" style="align-items:start;">

        <!-- Left: Card -->
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card" style="text-align:center;">
            <div style="position:relative;display:inline-block;margin-bottom:16px;">
              <div id="avatar-display" class="avatar avatar-xl" style="margin:0 auto;">I</div>
              <label for="avatar-input" style="position:absolute;bottom:0;right:0;width:30px;height:30px;background:var(--accent);border-radius:50%;display:grid;place-items:center;cursor:pointer;font-size:14px;"><i class="fa-solid fa-pencil"></i></label>
              <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">
            </div>
            <h2 id="p-name" style="font-size:20px;font-weight:700;">—</h2>
            <p id="p-school" style="color:var(--text-muted);font-size:13px;margin-top:4px;"></p>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
              <p id="p-email"  style="font-size:13px;color:var(--text-secondary);"></p>
              <p id="p-phone" style="font-size:13px;color:var(--text-secondary);margin-top:4px;"></p>
              <p id="p-dept"  style="font-size:13px;color:var(--text-secondary);margin-top:4px;"></p>
              <div style="margin-top:12px;"><span id="p-status" class="badge">—</span></div>
            </div>
          </div>

          <!-- Internship Info -->
          <div class="card">
            <div class="card-header"><div class="card-title">Internship Duration</div></div>
            <div class="flex-between mb-16">
              <div><div class="form-label">Start Date</div><div id="p-start" style="font-weight:600;font-size:15px;">—</div></div>
              <div style="text-align:right;"><div class="form-label">End Date</div><div id="p-end" style="font-weight:600;font-size:15px;">—</div></div>
            </div>
            <div class="form-label" style="margin-bottom:6px;">Progress — <span id="p-prog">0</span>%</div>
            <div class="progress-bar"><div class="progress-fill" id="p-prog-bar" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));"></div></div>
          </div>

          <!-- Change Password -->
          <div class="card">
            <div class="card-header"><div class="card-title">Change Password</div></div>
            <form id="pw-form">
              <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-control" id="p-current" required></div>
              <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-control" id="p-new" required></div>
              <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="p-confirm" required></div>
              <button type="submit" class="btn btn-primary w-full" id="pw-btn">Change Password</button>
            </form>
          </div>
        </div>

        <!-- Right: Edit -->
        <div class="card">
          <div class="card-header"><div class="card-title">Edit Profile</div></div>
          <form id="profile-form">
            <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="f-name" required></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="f-email" disabled style="opacity:0.6;"></div>
            <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="f-phone"></div>
            <div class="form-group"><label class="form-label">School / University</label><input class="form-control" id="f-school"></div>
            <div class="form-group"><label class="form-label">Department</label><input class="form-control" id="f-dept"></div>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-control" id="f-start"></div>
              <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-control" id="f-end"></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
              <button type="button" class="btn btn-ghost" onclick="loadProfile()">Discard</button>
              <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
Auth.requireIntern(); populateSidebarUser(); initLogout();
const user = Auth.user();

async function loadProfile() {
  try {
    const p = await apiFetch(`/interns/${user.id}`);
    document.getElementById('p-name').textContent   = p.full_name;
    document.getElementById('p-school').textContent = p.school||'';
    document.getElementById('p-email').textContent  = ''+p.email;
    document.getElementById('p-phone').textContent  = ''+(p.phone||'Not set');
    document.getElementById('p-dept').textContent   = ''+(p.department||'Not set');
    document.getElementById('p-start').textContent  = fmtDate(p.internship_start);
    document.getElementById('p-end').textContent    = fmtDate(p.internship_end);
    const prog = internshipProgress(p.internship_start, p.internship_end);
    document.getElementById('p-prog').textContent   = prog;
    document.getElementById('p-prog-bar').style.width = prog+'%';
    const statusMap={approved:'badge-success',pending:'badge-warning',rejected:'badge-danger'};
    document.getElementById('p-status').className = 'badge '+(statusMap[p.status]||'badge-secondary');
    document.getElementById('p-status').textContent = p.status;
    document.getElementById('f-name').value   = p.full_name||'';
    document.getElementById('f-email').value  = p.email||'';
    document.getElementById('f-phone').value  = p.phone||'';
    document.getElementById('f-school').value = p.school||'';
    document.getElementById('f-dept').value   = p.department||'';
    document.getElementById('f-start').value  = p.internship_start?.split('T')[0]||'';
    document.getElementById('f-end').value    = p.internship_end?.split('T')[0]||'';
    const av=document.getElementById('avatar-display');
    if(p.profile_picture){av.innerHTML=`<img src="${p.profile_picture}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">`;av.style.background='none';}
    else{av.textContent=initials(p.full_name);}
  } catch(e){toast(e.message,'error');}
}

document.getElementById('profile-form').addEventListener('submit',async e=>{
  e.preventDefault(); const btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='Saving...';
  try {
    await apiFetch(`/interns/${user.id}`,{method:'PUT',body:JSON.stringify({full_name:document.getElementById('f-name').value,phone:document.getElementById('f-phone').value,school:document.getElementById('f-school').value,department:document.getElementById('f-dept').value,internship_start:document.getElementById('f-start').value,internship_end:document.getElementById('f-end').value})});
    toast('Profile updated!','success'); loadProfile();
  } catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.textContent='Save Changes';}
});

document.getElementById('pw-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const np=document.getElementById('p-new').value;
  if(np!==document.getElementById('p-confirm').value) return toast('Passwords do not match','error');
  if(np.length<8) return toast('Password must be at least 8 characters','error');
  const btn=document.getElementById('pw-btn'); btn.disabled=true; btn.textContent='Changing...';
  try {
    await apiFetch(`/interns/${user.id}/password`,{method:'PATCH',body:JSON.stringify({current_password:document.getElementById('p-current').value,new_password:np})});
    toast('Password changed!','success'); document.getElementById('pw-form').reset();
  } catch(e){toast(e.message,'error');}
  finally{btn.disabled=false;btn.textContent='Change Password';}
});

async function uploadAvatar(input) {
  if(!input.files[0]) return;
  const fd=new FormData(); fd.append('avatar',input.files[0]);
  try {
    const res=await fetch(`http://localhost:5000/api/interns/${user.id}/avatar`,{method:'POST',headers:{Authorization:`Bearer ${Auth.token()}`},body:fd});
    const data=await res.json(); if(!res.ok) throw new Error(data.message);
    toast('Profile picture updated!','success'); loadProfile();
  } catch(e){toast(e.message,'error');}
}
loadProfile();
</script>
</body>
</html>
